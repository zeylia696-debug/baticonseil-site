<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — SCC Admin</title>
  <link rel="stylesheet" href="admin.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
</head>
<body class="login-page">

  <div class="login-wrap">
    <div class="login-card">

      <div class="login-logo">
        <img src="../assets/img/logo.png" alt="SCC" style="height:72px;width:auto;margin:0 auto 12px;display:block" onerror="this.style.display='none'">
        <h1>Panel Admin</h1>
        <p>Synergie Conseils Constructions</p>
      </div>

      <form id="loginForm">
        <div class="login-field">
          <label for="loginPassword">Mot de passe</label>
          <div class="pwd-wrap">
            <input type="password" id="loginPassword" autocomplete="current-password" placeholder="••••••••" required autofocus>
            <button type="button" id="togglePwd" class="pwd-toggle" title="Afficher le mot de passe" aria-label="Afficher le mot de passe">👁</button>
          </div>
        </div>
        <div id="loginError" class="login-error" role="alert" aria-live="polite"></div>
        <button type="submit" class="login-btn" id="loginBtn">
          <span id="loginBtnText">Se connecter</span>
        </button>
      </form>

    </div>
  </div>

  <script>
    const PWD_KEY      = 'scc_admin_pwd';
    const DEFAULT_HASH = '240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9';
    const LOCK_KEY     = 'scc_login_lock';
    const MAX_TRIES    = 5;
    const LOCK_MS      = 15 * 60 * 1000; // 15 min lockout

    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    function getLock() {
      try { return JSON.parse(localStorage.getItem(LOCK_KEY) || '{"count":0,"ts":0}'); }
      catch(e) { return {count:0, ts:0}; }
    }
    function isLocked() {
      const l = getLock();
      if (l.count >= MAX_TRIES) {
        if (Date.now() - l.ts < LOCK_MS) return true;
        localStorage.removeItem(LOCK_KEY); // lockout expired
      }
      return false;
    }
    function recordFail() {
      const l = getLock();
      l.count = (l.count || 0) + 1;
      l.ts = Date.now();
      localStorage.setItem(LOCK_KEY, JSON.stringify(l));
    }
    function clearLock() { localStorage.removeItem(LOCK_KEY); }

    // Reset lockout if ?reset param present (emergency use)
    if (new URLSearchParams(location.search).has('reset')) {
      localStorage.removeItem(LOCK_KEY);
      localStorage.removeItem(PWD_KEY);
    }

    // Already logged in?
    if (sessionStorage.getItem('scc_admin_auth') === '1') {
      window.location.replace('index.html');
    }

    // Show lockout on page load if active
    if (isLocked()) {
      document.getElementById('loginError').textContent = 'Trop de tentatives. Réessayez dans 15 minutes.';
      document.getElementById('loginBtn').disabled = true;
    }

    document.getElementById('togglePwd').addEventListener('click', () => {
      const inp = document.getElementById('loginPassword');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    });

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const errEl = document.getElementById('loginError');
      const btn   = document.getElementById('loginBtn');
      const txt   = document.getElementById('loginBtnText');

      if (isLocked()) {
        errEl.textContent = 'Compte verrouillé. Réessayez dans 15 minutes.';
        return;
      }

      const pwd = document.getElementById('loginPassword').value;
      if (!pwd) return;

      btn.disabled = true;
      txt.textContent = '…';

      try {
        const enteredHash = await sha256(pwd);
        const storedRaw   = localStorage.getItem(PWD_KEY);
        const storedHash  = storedRaw || DEFAULT_HASH;

        // Legacy migration: if stored value is plain-text (not 64-char hex), compare directly
        const isHashFormat = /^[0-9a-f]{64}$/.test(storedHash);
        const match = isHashFormat
          ? (enteredHash === storedHash)
          : (pwd === storedHash); // old plain-text comparison

        if (match) {
          // Re-hash and store if was plain-text
          if (!isHashFormat) localStorage.setItem(PWD_KEY, enteredHash);
          clearLock();
          sessionStorage.setItem('scc_admin_auth', '1');
          window.location.replace('index.html');
        } else {
          recordFail();
          const l = getLock();
          const remaining = Math.max(0, MAX_TRIES - l.count);
          if (remaining === 0) {
            errEl.textContent = 'Compte verrouillé pour 15 minutes.';
            btn.disabled = true;
          } else {
            errEl.textContent = `Mot de passe incorrect. ${remaining} tentative${remaining > 1 ? 's' : ''} restante${remaining > 1 ? 's' : ''}.`;
            btn.disabled = false;
            txt.textContent = 'Se connecter';
          }
          document.getElementById('loginPassword').value = '';
          document.getElementById('loginPassword').focus();
        }
      } catch(err) {
        errEl.textContent = 'Erreur technique. Réessayez.';
        btn.disabled = false;
        txt.textContent = 'Se connecter';
      }
    });
  </script>

</body>
</html>
